# 北魏历史小说智能体 - 主配置

project:
  name: "北魏历史小说智能体"
  version: "0.1.0"
  data_dir: "./data"
  log_level: "INFO"
  writing_mode: "quality"  # 写作模式：quality(历史正剧) / volume(商业快消) / hybrid(平衡)

# LLM 配置
llm:
  # 各模型 API 配置 (LiteLLM 格式)
  models:
    claude-opus-4-6:
      model: "openai/kimi-k2-thinking-251104"
      api_key: "${ARK_API_KEY}"
      api_base: "https://ark.cn-beijing.volces.com/api/v3"
      max_tokens: 4096
      temperature: 0.7

    gpt-4o:
      model: "openai/gpt-4o"
      api_key: "${OPENAI_API_KEY}"
      max_tokens: 4096
      temperature: 0.7

    deepseek-reasoner:
      model: "deepseek/deepseek-reasoner"
      api_key: "${DEEPSEEK_API_KEY}"
      api_base: "https://api.deepseek.com"
      max_tokens: 4096
      temperature: 0.7

    deepseek-chat:
      model: "deepseek/deepseek-chat"
      api_key: "${DEEPSEEK_API_KEY}"
      api_base: "https://api.deepseek.com"
      max_tokens: 4096
      temperature: 0.7

    deepseek-v3-2-sf:
      model: "openai/deepseek-ai/DeepSeek-V3.2"
      api_key: "${SILICONFLOW_API_KEY}"
      api_base: "https://api.siliconflow.cn/v1"
      max_tokens: 4096
      temperature: 0.7

    kimi:
      model: "openai/moonshotai/Kimi-K2-Thinking"
      api_key: "sk-mavaigvxdiakmxpdxejgtesbkyzzkldhvfnqtggtpzpjjgiy"
      api_base: "https://api.siliconflow.cn/v1"
      max_tokens: 4096
      temperature: 0.7

    kimi-k2:
      model: "moonshotai/Kimi-K2-Thinking"
      api_key: "sk-mavaigvxdiakmxpdxejgtesbkyzzkldhvfnqtggtpzpjjgiy"
      api_base: "https://api.siliconflow.cn/v1"
      max_tokens: 4096
      temperature: 0.7

    minimax:
      model: "openrouter/minimax/minimax-01"
      api_key: "${OPENROUTER_API_KEY}"
      max_tokens: 4096
      temperature: 0.7

# Agent 模型分配
agents:
  world_builder:
    model: "deepseek-chat"
    max_tokens: 4096

  plot_designer:
    model: "deepseek-chat"
    max_tokens: 4096

  writer:
    model: "deepseek-chat"
    max_tokens: 3072

  # 节奏优化器（通用，原 fanqie_optimizer）
  pacing_optimizer:
    model: "deepseek-chat"
    max_tokens: 4096
    # 仅在 volume 模式下启用
    enabled_in_modes: ["volume", "hybrid"]

  sandbox_debater:
    npc_model: "deepseek-chat"
    host_model: "deepseek-chat"
    max_rounds: 5
    npc_concurrent: true

  consistency_checker:
    model: "deepseek-chat"
    max_tokens: 4096

  style_polisher:
    model: "deepseek-chat"
    max_tokens: 4096

  emotion_risk_control:
    model: "deepseek-chat"
    max_tokens: 4096

  summarizer:
    model: "deepseek-chat"
    max_tokens: 2048

# RAG 配置
rag:
  embedding_model: "BAAI/bge-m3"
  vector_db_path: "./data/knowledge_base/chroma_db"
  chunk_size: 800
  chunk_overlap: 150
  top_k: 5

# 记忆系统配置
memory:
  short_term_window: 3
  summary_max_tokens: 500

# 工作流配置
workflow:
  auto_mode: false
  review_points:
    - world_setting
    - outline
    - emotion_risk_fail

  # 写作模式配置
  writing_modes:
    quality:
      # 历史正剧模式：完整 pipeline，注重质量
      skip_polish: false
      skip_consistency_retry: false
      skip_debate: false
      chapter_word_min: 2500
      chapter_word_max: 3500
      pacing_target: 0.5  # 每千字冲突次数（较低，允许铺垫）
      cliffhanger_mode: "soft"  # soft=悬念钩子，hard=强卡点
      historical_accuracy_check: true  # 强制历史准确性检查
    volume:
      # 商业快消模式：快速 pipeline，注重节奏
      skip_polish: true
      skip_consistency_retry: true
      skip_debate: true
      chapter_word_min: 1500
      chapter_word_max: 2000
      pacing_target: 1.0  # 每千字冲突次数（较高）
      cliffhanger_mode: "hard"
      historical_accuracy_check: false
    hybrid:
      # 平衡模式：保留质量检查，适度增强节奏
      skip_polish: false
      skip_consistency_retry: false
      skip_debate: true
      chapter_word_min: 2000
      chapter_word_max: 2800
      pacing_target: 0.7
      cliffhanger_mode: "soft"
      historical_accuracy_check: true

  write_range_defaults:
    default_range: "1-10"
    overwrite: false
    stage_timeout_seconds: 300
  fallback_retry_policy:
    max_retries: 0
    retry_delay: 1.0
    fallback_aliases:
      - kimi
  role_model_chains: {}
  trace_logging:
    enable: true
    log_path: "./logs"
    format: "json"

# 节奏配置（通用）
pacing:
  conflict_types: ["打脸", "反转", "金手指", "碾压", "危机解除", "智斗", "揭秘"]
  cliffhanger_patterns:
    soft: ["悬念", "转折", "伏笔"]
    hard: ["绝境", "倒计时", "身份暴露", "突现"]
